name: Laravel Selective Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Sync selected folders (exclude public/storage)
        run: |
          rsync -avz --delete \
            --exclude='public/storage' \
            -e "ssh -o IdentitiesOnly=yes" \
            app config routes resources public \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/stagirf4/terezaestates.stagingshop.com

      - name: Run Laravel commands (no migrations)
        run: |
          ssh -o IdentitiesOnly=yes ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd /home/stagirf4/terezaestates.stagingshop.com

            echo "🧹 Clear cache"
            php artisan optimize:clear

            echo "🚀 Optimize"
            php artisan optimize

            echo "🔐 Fix permissions"
            chmod -R 775 storage bootstrap/cache

            echo "✅ Done"
          EOF